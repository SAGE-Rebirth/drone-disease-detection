# Disease Drone — YOLO Dataset Config
# 'path' is resolved at runtime by train.py / evaluate.py relative to ml/
# Use a relative path so the project works on any machine (macOS, Windows, Linux).

path: ../ml/data/processed
train: train/images
val: val/images
test: test/images

# Class names (5 classes)
names:
  0: healthy
  1: leaf_blight
  2: leaf_spot
  3: rust
  4: powdery_mildew
